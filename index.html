<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PokeLeague - Liga y Torneo</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }
    .bracket {
      display: flex;
      gap: 4rem;
      padding: 2rem;
      overflow-x: auto;
      min-height: 600px;
    }
    .round {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      min-width: 200px;
    }
    .round-header {
      text-align: center;
      font-size: 1.25rem;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .match {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      border-radius: 12px;
      padding: 1rem;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border: 2px solid #475569;
      transition: all 0.3s ease;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .match:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      border-color: #facc15;
    }
    .match.pending {
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d3d 100%);
      border-color: #6b7280;
    }
    .team {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .team:hover {
      background: rgba(255,255,255,0.05);
    }
    .team.winner {
      background: rgba(250, 204, 21, 0.15);
      border-left: 3px solid #facc15;
    }
    .team-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: #e2e8f0;
    }
    .team-name.pending {
      color: #9ca3af;
      font-style: italic;
      font-size: 0.85rem;
    }
    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 0;
      color: #64748b;
      font-size: 0.75rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    /* Connector lines */
    .match::after {
      content: "";
      position: absolute;
      right: -4rem;
      top: 50%;
      width: 4rem;
      height: 2px;
      background: linear-gradient(90deg, #475569 0%, #475569 100%);
    }
    .match::before {
      content: "";
      position: absolute;
      right: -4rem;
      top: 50%;
      width: 8px;
      height: 8px;
      background: #facc15;
      border-radius: 50%;
      transform: translateY(-50%);
      box-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
    }
    .round:last-child .match::after,
    .round:last-child .match::before {
      display: none;
    }
    /* Champion styling */
    .round:last-child .match {
      background: linear-gradient(135deg, #854d0e 0%, #a16207 50%, #854d0e 100%);
      border-color: #facc15;
      box-shadow: 0 0 30px rgba(250, 204, 21, 0.3);
    }
    .round:last-child .match .team-name {
      color: #fef3c7;
      font-size: 1.1rem;
    }
    .champion-trophy {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5rem;
      filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5));
    }
    /* Responsive */
    @media (max-width: 768px) {
      .bracket {
        gap: 2rem;
        padding: 1rem;
      }
      .round {
        min-width: 160px;
        gap: 1.5rem;
      }
      .round-header {
        font-size: 1rem;
        letter-spacing: 1px;
      }
      .match {
        min-height: 80px;
        padding: 0.75rem;
      }
      .match::after {
        width: 2rem;
        right: -2rem;
      }
      .match::before {
        right: -2rem;
      }
      .team-name {
        font-size: 0.85rem;
      }
      .team-name.pending {
        font-size: 0.75rem;
      }
    }
    @media (max-width: 480px) {
      .bracket {
        gap: 1rem;
      }
      .round {
        min-width: 140px;
        gap: 1rem;
      }
      .match {
        min-height: 70px;
        padding: 0.5rem;
      }
      .team {
        padding: 0.25rem 0.5rem;
      }
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-800 p-4 flex justify-center gap-6 text-yellow-400 font-bold">
    <a href="index.html" class="underline">Liga y Torneo</a>
    <a href="jornadas.html">Jornadas</a>
    <a href="equipos.html">Equipos</a>
    <a href="reglas.html">Reglas</a>
  </nav>

  <header class="p-6 text-center text-3xl font-bold text-yellow-400">🏆 PokeLeague</header>

  <main class="max-w-7xl mx-auto px-4 py-4">
    <!-- Clasificación -->
    <section>
      <h2 class="text-2xl font-semibold mb-4">Clasificación Liga</h2>
      <div class="overflow-x-auto bg-gray-800 rounded-lg p-4 shadow">
        <table class="min-w-full text-center">
          <thead>
            <tr class="bg-gray-700 text-yellow-300">
              <th class="py-2 px-4">Entrenador</th>
              <th class="py-2 px-4">Victorias</th>
              <th class="py-2 px-4">Derrotas</th>
            </tr>
          </thead>
          <tbody id="tabla-liga"></tbody>
        </table>
      </div>
    </section>

    <!-- SECCIÓN TORNEO -->
    <section class="mt-12">
      <h2 class="text-2xl font-semibold mb-4 text-center">Torneo Final</h2>
      <div id="brackets" class="bracket"></div>
    </section>
  </main>

  <script>
    fetch("datos.json")
      .then(res => res.json())
      .then(data => {
        // === LIGA ===
        const tabla = document.getElementById("tabla-liga");
        const ligaOrdenada = (data.liga || []).slice().sort((a, b) => b.victorias - a.victorias);
        ligaOrdenada.forEach(entrenador => {
          const row = document.createElement("tr");
          row.className = "border-b border-gray-700 hover:bg-gray-800";
          row.innerHTML = `
            <td class="py-2 px-4">${entrenador.nombre}</td>
            <td class="py-2 px-4">${entrenador.victorias}</td>
            <td class="py-2 px-4">${entrenador.derrotas}</td>
          `;
          tabla.appendChild(row);
        });

        // === TORNEO ===
        const fases = ["octavos", "cuartos", "semis", "final"];
        const nombres = {
          octavos: "Octavos",
          cuartos: "Cuartos",
          semis: "Semifinales",
          final: "Final"
        };

        const bracketsDiv = document.getElementById("brackets");

        fases.forEach(fase => {
          const emparejamientos = data.torneo?.[fase];
          if (!Array.isArray(emparejamientos)) return;

          const columna = document.createElement("div");
          columna.className = "round";
          columna.innerHTML = `<div class="round-header">${nombres[fase]}</div>`;

          emparejamientos.forEach((matchData) => {
            const [p1, p2] = matchData;
            const isPending = p1.includes("Ganador") || p2.includes("Ganador");

            const match = document.createElement("div");
            match.className = `match ${isPending ? "pending" : ""}`;

            // Add champion trophy for final
            if (fase === "final") {
              const trophy = document.createElement("div");
              trophy.className = "champion-trophy";
              trophy.textContent = "🏆";
              match.appendChild(trophy);
            }

            // Team 1
            const team1 = document.createElement("div");
            team1.className = `team ${!isPending ? "winner" : ""}`;
            team1.innerHTML = `
              <span class="team-name ${p1.includes("Ganador") ? "pending" : ""}">${p1}</span>
            `;

            // VS divider
            const divider = document.createElement("div");
            divider.className = "vs-divider";
            divider.textContent = "VS";

            // Team 2
            const team2 = document.createElement("div");
            team2.className = `team ${!isPending ? "winner" : ""}`;
            team2.innerHTML = `
              <span class="team-name ${p2.includes("Ganador") ? "pending" : ""}">${p2}</span>
            `;

            match.appendChild(team1);
            match.appendChild(divider);
            match.appendChild(team2);
            columna.appendChild(match);
          });

          bracketsDiv.appendChild(columna);
        });
      })
      .catch(err => console.error("Error al cargar datos:", err));
  </script>
</body>
</html>
